name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.changesets.outputs.published }}
      publishedPackages: ${{ steps.changesets.outputs.publishedPackages }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Create Release Pull Request or Tag
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm run version-packages
          publish: pnpm changeset tag
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: release
    if: needs.release.outputs.published == 'true'
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Get version
        id: version
        run: echo "version=$(echo '${{ needs.release.outputs.publishedPackages }}' | jq -r '.[0].version')" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: "gitpeek@${{ steps.version.outputs.version }}"

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --filter gitpeek build

      - name: Upload artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "gitpeek@${{ steps.version.outputs.version }}"
          files: |
            packages/gitpeek/build/**/*.dmg
            packages/gitpeek/build/**/*.tar.zst
            packages/gitpeek/build/**/*.json
